name: Publish OneSync and release

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-dockerhub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/onesync
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=sha
      - name: Resolve application version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="$(sed -n 's/^ARG APP_VERSION=//p' Dockerfile)"
          fi
          echo "value=${version}" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: APP_VERSION=${{ steps.version.outputs.value }}

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: softprops/action-gh-release@v2
        with:
          name: OneSync ${{ github.ref_name }}
          body: |
            ## OneSync ${{ github.ref_name }}

            本版本完善同步授权、企业微信通知和支持页面体验。

            ### 更新内容
            - “同步授权”改为弹窗显示 Microsoft 登录链接和设备代码
            - 设备代码支持点击复制，并在授权成功后自动恢复持续同步
            - 授权异常退出时显示明确错误，不再长期停留在等待状态
            - 修复企业微信机器人 Webhook 的保存、脱敏回显与 Markdown 消息格式
            - Webhook 发送失败不再导致后台通知任务退出
            - 替换并优化微信、支付宝二维码，改善桌面与移动端扫码尺寸
            - 修复主动停止同步时可能误报引擎故障的问题
            - 更新 Unraid XML，默认部署 Docker Hub `waning/onesync:0.1.3`

            GitHub Release 仅包含版本说明，不上传软件包或附件。镜像请从 Docker Hub 获取。
          generate_release_notes: true
