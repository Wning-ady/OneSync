name: Publish OneSync and release

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-dockerhub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/onesync
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=sha
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: APP_VERSION=0.1.0

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: softprops/action-gh-release@v2
        with:
          name: OneSync ${{ github.ref_name }}
          body: |
            ## OneSync ${{ github.ref_name }}

            本版本提供 OneDrive 双向同步管理能力：可选择同步目录、查看实时传输进度与同步日志，并支持 Webhook 通知。

            ### 更新内容
            - 优化同步状态、日志与历史传输统计展示
            - 支持云端与本地变更方向、文件状态及冲突信息
            - 改进设备授权、Graph 连接状态和通知配置
            - 提供 Unraid XML 部署模板与 Docker Hub 镜像

            GitHub Release 仅包含版本说明，不上传软件包或附件。镜像请从 Docker Hub 获取。
          generate_release_notes: true
