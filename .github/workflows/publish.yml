name: Security, publish, and release

on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      publish:
        description: Publish the verified image to Docker Hub
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: onesync-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

env:
  GITLEAKS_IMAGE: zricethezav/gitleaks@sha256:c00b6bd0aeb3071cbcb79009cb16a60dd9e0a7c60e2be9ab65d25e6bc8abbb7f
  HADOLINT_IMAGE: hadolint/hadolint@sha256:7aba693c1442eb31c0b015c129697cb3b6cb7da589d85c7562f9deb435a6657c
  TRIVY_IMAGE: aquasec/trivy@sha256:cffe3f5161a47a6823fbd23d985795b3ed72a4c806da4c4df16266c02accdd6f
  SEMGREP_IMAGE: semgrep/semgrep@sha256:bdf7013b2c3634a487671158da77c554f531742326b543a9464d2adf6c433ac8
  COSIGN_IMAGE: gcr.io/projectsigstore/cosign@sha256:d91bc4e7e95e8d2f549c747a72dc174f90579e410a1695f57f686674f84ce849

jobs:
  security:
    name: Supply-chain security gates
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out the exact revision
        env:
          REPOSITORY_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git init "$GITHUB_WORKSPACE"
          cd "$GITHUB_WORKSPACE"
          git remote add origin "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY.git"
          export GIT_CONFIG_COUNT=1
          export GIT_CONFIG_KEY_0=http.extraheader
          basic_auth=$(printf 'x-access-token:%s' "$REPOSITORY_TOKEN" | base64 -w 0)
          export GIT_CONFIG_VALUE_0="AUTHORIZATION: basic $basic_auth"
          git fetch --no-tags --depth=1 origin "$GITHUB_SHA"
          unset basic_auth GIT_CONFIG_COUNT GIT_CONFIG_KEY_0 GIT_CONFIG_VALUE_0 REPOSITORY_TOKEN
          git checkout --detach FETCH_HEAD

      - name: Scan repository for secrets
        run: |
          docker run --rm \
            --volume "$GITHUB_WORKSPACE:/repo:ro" \
            --workdir /repo \
            "$GITLEAKS_IMAGE" \
            detect --source . --no-banner --redact --exit-code 1

      - name: Lint Dockerfile
        run: |
          docker run --rm \
            --volume "$GITHUB_WORKSPACE:/repo:ro" \
            --workdir /repo \
            "$HADOLINT_IMAGE" \
            hadolint --failure-threshold error Dockerfile

      - name: Scan source and locked dependencies
        run: |
          docker run --rm \
            --volume "$GITHUB_WORKSPACE:/repo:ro" \
            "$TRIVY_IMAGE" \
            fs --scanners vuln,secret,misconfig \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --ignorefile /repo/.trivyignore \
            --exit-code 1 \
            /repo

      - name: Run Semgrep security rules
        run: |
          docker run --rm \
            --volume "$GITHUB_WORKSPACE:/src:ro" \
            --workdir /src \
            --entrypoint semgrep \
            "$SEMGREP_IMAGE" \
            scan --config p/python --config p/secrets \
            --severity ERROR --metrics off --error .

      - name: Run tests in the locked production base
        run: docker build --target test --tag onesync:test .

  publish-dockerhub:
    name: Build, verify, attest, and publish
    if: github.event_name != 'pull_request' && (github.event_name != 'workflow_dispatch' || inputs.publish)
    needs: security
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out the exact revision
        env:
          REPOSITORY_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git init "$GITHUB_WORKSPACE"
          cd "$GITHUB_WORKSPACE"
          git remote add origin "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY.git"
          export GIT_CONFIG_COUNT=1
          export GIT_CONFIG_KEY_0=http.extraheader
          basic_auth=$(printf 'x-access-token:%s' "$REPOSITORY_TOKEN" | base64 -w 0)
          export GIT_CONFIG_VALUE_0="AUTHORIZATION: basic $basic_auth"
          git fetch --no-tags --depth=1 origin "$GITHUB_SHA"
          unset basic_auth GIT_CONFIG_COUNT GIT_CONFIG_KEY_0 GIT_CONFIG_VALUE_0 REPOSITORY_TOKEN
          git checkout --detach FETCH_HEAD

      - name: Log in to Docker Hub
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail
          printf '%s' "$DOCKERHUB_TOKEN" | docker login docker.io \
            --username "$DOCKERHUB_USERNAME" --password-stdin

      - name: Create Buildx builder
        run: docker buildx create --name onesync-builder --driver docker-container --use

      - name: Build local audit image
        run: |
          docker buildx build \
            --load \
            --platform linux/amd64 \
            --tag onesync:security-audit \
            .

      - name: Block fixable high and critical image vulnerabilities
        run: |
          docker run --rm \
            --volume /var/run/docker.sock:/var/run/docker.sock \
            "$TRIVY_IMAGE" \
            image --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 1 \
            onesync:security-audit

      - name: Resolve immutable image tags
        id: image
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          set -euo pipefail
          image="docker.io/${DOCKERHUB_USERNAME}/onesync"
          version=""
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            version="${GITHUB_REF_NAME#v}"
          fi
          echo "reference=$image" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Push image with SBOM and provenance
        id: push
        env:
          IMAGE_REFERENCE: ${{ steps.image.outputs.reference }}
          RELEASE_VERSION: ${{ steps.image.outputs.version }}
        run: |
          set -euo pipefail
          tag_args=(
            --tag "$IMAGE_REFERENCE:latest"
            --tag "$IMAGE_REFERENCE:sha-${GITHUB_SHA:0:12}"
          )
          build_args=()
          if [[ -n "$RELEASE_VERSION" ]]; then
            tag_args+=(--tag "$IMAGE_REFERENCE:$RELEASE_VERSION")
            build_args+=(--build-arg "APP_VERSION=$RELEASE_VERSION")
          fi
          docker buildx build \
            --platform linux/amd64 \
            --push \
            --provenance=mode=max \
            --sbom=true \
            --metadata-file build-metadata.json \
            "${build_args[@]}" \
            "${tag_args[@]}" \
            .
          digest=$(python3 -c 'import json; print(json.load(open("build-metadata.json"))["containerimage.digest"])')
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

      - name: Keyless-sign the published digest
        env:
          IMAGE_REFERENCE: ${{ steps.image.outputs.reference }}
          IMAGE_DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          docker run --rm \
            --user 0:0 \
            --env ACTIONS_ID_TOKEN_REQUEST_TOKEN \
            --env ACTIONS_ID_TOKEN_REQUEST_URL \
            --env COSIGN_EXPERIMENTAL=1 \
            --env DOCKER_CONFIG=/root/.docker \
            --volume "$HOME/.docker:/root/.docker:ro" \
            "$COSIGN_IMAGE" \
            sign --yes "$IMAGE_REFERENCE@$IMAGE_DIGEST"

      - name: Update Docker Hub description
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail
          login_payload=$(jq -n \
            --arg username "$DOCKERHUB_USERNAME" \
            --arg password "$DOCKERHUB_TOKEN" \
            '{username:$username,password:$password}')
          hub_jwt=$(curl --fail-with-body --silent --show-error \
            --request POST \
            --header 'Content-Type: application/json' \
            --data "$login_payload" \
            https://hub.docker.com/v2/users/login/ | jq -r .token)
          test -n "$hub_jwt"
          description_payload=$(jq -n \
            --arg description '安全、可控的 Unraid OneDrive 选择性双向同步管理器' \
            --rawfile full_description docs/DOCKERHUB.md \
            '{description:$description,full_description:$full_description}')
          curl --fail-with-body --silent --show-error \
            --request PATCH \
            --header "Authorization: JWT $hub_jwt" \
            --header 'Content-Type: application/json' \
            --data "$description_payload" \
            --output /dev/null \
            "https://hub.docker.com/v2/repositories/$DOCKERHUB_USERNAME/onesync/"
          unset hub_jwt login_payload description_payload

  release:
    name: Create GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: publish-dockerhub
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Check out release notes
        env:
          REPOSITORY_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git init "$GITHUB_WORKSPACE"
          cd "$GITHUB_WORKSPACE"
          git remote add origin "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY.git"
          export GIT_CONFIG_COUNT=1
          export GIT_CONFIG_KEY_0=http.extraheader
          basic_auth=$(printf 'x-access-token:%s' "$REPOSITORY_TOKEN" | base64 -w 0)
          export GIT_CONFIG_VALUE_0="AUTHORIZATION: basic $basic_auth"
          git fetch --no-tags --depth=1 origin "$GITHUB_SHA"
          unset basic_auth GIT_CONFIG_COUNT GIT_CONFIG_KEY_0 GIT_CONFIG_VALUE_0 REPOSITORY_TOKEN
          git checkout --detach FETCH_HEAD

      - name: Create release notes without binary assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          notes="docs/releases/${GITHUB_REF_NAME}.md"
          test -f "$notes"
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --title "OneSync $GITHUB_REF_NAME" \
            --notes-file "$notes"
