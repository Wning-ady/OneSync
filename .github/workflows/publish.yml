name: Publish OneSync and release

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-dockerhub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/onesync
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=sha
      - name: Resolve application version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="$(sed -n 's/^ARG APP_VERSION=//p' Dockerfile)"
          fi
          echo "value=${version}" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: APP_VERSION=${{ steps.version.outputs.value }}

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: softprops/action-gh-release@v2
        with:
          name: OneSync ${{ github.ref_name }}
          body: |
            ## OneSync ${{ github.ref_name }}

            本版本完善 OneDrive 双向同步管理体验，修复连接与传输状态显示问题。

            ### 更新内容
            - 修复同步控制接口因状态写入依赖缺失而返回 `500` 的问题
            - 修复旧页面缓存导致的 `Failed to fetch`，兼容旧 Graph 状态接口
            - 显示真实文件传输百分比、下载体积及上传下载速度
            - 下载速度正确读取 OneDrive 的 `.partial` 临时文件
            - 重新设计传输进度区域，移除变更记录页面
            - 保留同步日志、Webhook 通知与 Unraid XML 部署支持

            GitHub Release 仅包含版本说明，不上传软件包或附件。镜像请从 Docker Hub 获取。
          generate_release_notes: true
